# golangci-lint v2 config
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  # Conservative initial set. Additional linters (ineffassign, staticcheck)
  # are intentionally omitted at release-prep time because they flag findings
  # in pre-existing code that is out of scope for Plan 17. They can be
  # enabled in a follow-up PR alongside the code cleanups.
  enable:
    - errcheck      # unchecked errors
    - govet         # suspicious constructs
    - unused        # unused code
    - misspell      # typos in comments/strings

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
