project_name: Bonsai
description: CLI tool for scaffolding Claude Code agent workspaces
docs_path: station/
scaffolding:
    - index
    - playbook
    - logs
    - reports
agents:
    tech-lead:
        agent_type: tech-lead
        workspace: station/
        skills:
            - planning-template
            - review-checklist
            - issue-classification
            - pr-creation
        workflows:
            - code-review
            - planning
            - pr-review
            - security-audit
            - session-logging
            - test-plan
            - session-wrapup
            - issue-to-implementation
        protocols:
            - memory
            - scope-boundaries
            - security
            - session-start
        sensors:
            - context-guard
            - scope-guard-files
            - session-context
            - status-bar
            - routine-check
            - agent-review
            - dispatch-guard
            - subagent-stop-review
        routines:
            - backlog-hygiene
            - dependency-audit
            - doc-freshness-check
            - infra-drift-check
            - memory-consolidation
            - roadmap-accuracy
            - status-hygiene
            - vulnerability-scan
        custom_items:
            pr-creation:
                description: How to create well-structured pull requests — branch naming, title conventions, body template, draft workflow.
            session-wrapup:
                description: End-of-session verification, review, cleanup, and summary — triggered by session wrap-up phrases.
