name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'catalog/**'
      - 'docs/**'
      - 'README.md'
  pull_request:
    paths:
      - 'website/**'
      - 'catalog/**'
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci
        working-directory: website

      - run: npm run generate:catalog
        working-directory: website

      - run: npm run build
        working-directory: website

      - uses: actions/upload-pages-artifact@v5
        if: github.event_name == 'push'
        with:
          path: website/dist

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
